# ============================================================
# Docker Compose — Full Agent Stack
#
# Services:
#   1. agent — FastAPI AI agent (stateless, scale ra nhiều replica)
#   2. redis — rate limit / cost guard / conversation history
#   3. nginx — reverse proxy, load balancer (round-robin)
#
# Chạy:  docker compose up --scale agent=3
# Test:  curl http://localhost/health
# Stop:  docker compose down
# ============================================================

version: "3.9"

services:
  agent:
    build: .
    environment:
      - ENVIRONMENT=staging
      - APP_NAME=Production AI Agent
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    # Không expose port trực tiếp — truy cập qua Nginx (port 80)
    networks:
      - internal

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - internal

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - agent
    restart: unless-stopped
    networks:
      - internal

networks:
  internal:
    driver: bridge
