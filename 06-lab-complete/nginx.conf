# ============================================================
# Nginx — Reverse proxy & Load balancer cho agent cluster
#
# Dùng Docker embedded DNS (127.0.0.11) để "agent" resolve ra
# IP của TẤT CẢ replica → round-robin giữa Agent1/2/3.
# ============================================================

events {
    worker_connections 256;
}

http {
    resolver 127.0.0.11 valid=10s;

    upstream agent_cluster {
        server agent:8000;
        keepalive 16;
    }

    server {
        listen 80;

        # Header debug: instance nào đã trả response (xem stateless/LB)
        add_header X-Upstream-Addr $upstream_addr always;

        location / {
            proxy_pass http://agent_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 3;
        }
    }
}
